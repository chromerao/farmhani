name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # 임포트/부팅 검증용 더미 환경변수 (실제 키 아님)
      SUPABASE_URL: https://ci-dummy.supabase.co
      SUPABASE_ANON_KEY: ci-dummy-anon-key
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall app
      - name: App import & route smoke test
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from app.main import app
          paths = set(app.openapi()["paths"].keys())
          required = {
              "/health",
              "/api/v1/plants",
              "/api/v1/plants/reminders",
              "/api/v1/chat/plant-care",
              "/api/v1/chat/plant-care/stream",
          }
          missing = required - paths
          assert not missing, f"missing routes: {missing}"
          print(f"OK: {len(paths)} routes registered")
          EOF
      - name: Rate limiter unit test
        run: |
          python - <<'EOF'
          import sys, time
          sys.path.insert(0, ".")
          from app.core.ratelimit import SlidingWindowRateLimiter
          rl = SlidingWindowRateLimiter(max_requests=3, window_seconds=0.4)
          assert all(rl.allow("u1") for _ in range(3))
          assert not rl.allow("u1")
          assert rl.allow("u2")
          time.sleep(0.5)
          assert rl.allow("u1")
          print("OK: rate limiter")
          EOF
      - name: Backend tests
        run: pytest tests

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check & build
        run: npm run build
