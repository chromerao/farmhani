<script>
        // Simple UI Interaction logic for toggling Login/Signup
        const toggleBtn = document.getElementById('toggle-auth');
        const submitBtn = document.getElementById('auth-submit');
        const title = document.querySelector('h2');
        const subtitle = title.nextElementSibling;
        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                title.textContent = '시작하기';
                subtitle.textContent = '회원이 되어 스마트한 식물 생활을 시작하세요.';
                submitBtn.innerHTML = '로그인 <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>';
                toggleBtn.textContent = '회원가입';
                document.querySelector('.text-label-sm.text-on-surface-variant.bg-white').textContent = '또는 이메일로 로그인';
            } else {
                title.textContent = '회원가입';
                subtitle.textContent = '식물 관리의 시작, Farm하니? 와 함께하세요.';
                submitBtn.innerHTML = '가입하기 <span class="material-symbols-outlined text-[18px]" data-icon="person_add">person_add</span>';
                toggleBtn.textContent = '로그인하기';
                document.querySelector('.text-label-sm.text-on-surface-variant.bg-white').textContent = '또는 이메일로 가입';
            }
        });

        // Ripple/Active effect simulation
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
