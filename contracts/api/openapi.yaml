openapi: 3.0.3
info:
  title: Plant Doctor RAG API
  version: 0.1.0
  description: 식물 주치의 AI MVP용 프론트-백엔드 공유 API 계약 초안입니다.
servers:
  - url: http://localhost:8000
    description: Local backend
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Backend is healthy
  /api/v1/plants:
    get:
      summary: List current user's plants
      responses:
        "200":
          description: Plant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plant"
    post:
      summary: Create a plant profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantCreate"
      responses:
        "201":
          description: Created plant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"
  /api/v1/plants/{plantId}/care-logs:
    post:
      summary: Create a care log for a plant
      parameters:
        - $ref: "#/components/parameters/PlantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CareLogCreate"
      responses:
        "201":
          description: Created care log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareLog"
  /api/v1/plants/{plantId}/photos:
    post:
      summary: Register uploaded plant photo metadata
      parameters:
        - $ref: "#/components/parameters/PlantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantPhotoCreate"
      responses:
        "201":
          description: Registered photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantPhoto"
  /api/v1/chat/plant-care:
    post:
      summary: Run plant care RAG consultation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantCareChatRequest"
      responses:
        "200":
          description: RAG answer with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantCareChatResponse"
  /api/v1/uploads/signed-url:
    post:
      summary: Get signed upload URL for plant photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadSignedUrlRequest"
      responses:
        "200":
          description: Signed upload URL and storage path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSignedUrlResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PlantId:
      name: plantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    PlantCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        species:
          type: string
        location:
          type: string
          example: 베란다
        sunlight:
          type: string
          example: 오전 직사광선
    Plant:
      allOf:
        - $ref: "#/components/schemas/PlantCreate"
        - type: object
          required: [id, createdAt]
          properties:
            id:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
    CareLogCreate:
      type: object
      properties:
        wateredAt:
          type: string
          format: date
        leafCondition:
          type: string
        soilCondition:
          type: string
        memo:
          type: string
    CareLog:
      allOf:
        - $ref: "#/components/schemas/CareLogCreate"
        - type: object
          required: [id, plantId, createdAt]
          properties:
            id:
              type: string
              format: uuid
            plantId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
    PlantPhotoCreate:
      type: object
      required: [storagePath]
      properties:
        storagePath:
          type: string
        capturedAt:
          type: string
          format: date-time
        note:
          type: string
    PlantPhoto:
      allOf:
        - $ref: "#/components/schemas/PlantPhotoCreate"
        - type: object
          required: [id, plantId, createdAt]
          properties:
            id:
              type: string
              format: uuid
            plantId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
    PlantCareChatRequest:
      type: object
      required: [plantId]
      properties:
        plantId:
          type: string
          format: uuid
        careLogId:
          type: string
          format: uuid
        photoId:
          type: string
          format: uuid
        question:
          type: string
          example: 잎 끝이 마르고 아래쪽 잎이 노랗게 변했어요.
    PlantCareChatResponse:
      type: object
      required: [summary, possibleCauses, todayActions, observationChecklist, citations]
      properties:
        summary:
          type: string
        possibleCauses:
          type: array
          items:
            type: string
        todayActions:
          type: array
          items:
            type: string
        observationChecklist:
          type: array
          items:
            type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        safetyNotice:
          type: string
    Citation:
      type: object
      required: [sourceId, title]
      properties:
        sourceId:
          type: string
        title:
          type: string
        url:
          type: string
        publisher:
          type: string
    UploadSignedUrlRequest:
      type: object
      required: [fileName]
      properties:
        fileName:
          type: string
          example: monstera.jpg
        mimeType:
          type: string
          example: image/jpeg
    UploadSignedUrlResponse:
      type: object
      required: [signedUrl, storagePath]
      properties:
        signedUrl:
          type: string
          example: https://xyz.supabase.co/storage/v1/object/upload/sign/plant-photos/...
        storagePath:
          type: string
          example: users/d3b07384-d113-49c3-a558-1ec114a84d41/plants/abcd-efgh-1234_monstera.jpg
